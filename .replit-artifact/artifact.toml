kind = "mobile"
previewPath = "/"
title = "Lumen"
version = "1.0.0"
id = "artifacts/lumen"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18559

[services.development]
run = "pnpm --filter @workspace/lumen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumen", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lumen", "run", "serve" ]

[services.env]
PORT = "18559"
BASE_PATH = "/"
